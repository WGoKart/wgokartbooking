<!DOCTYPE html>
<html>
    

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>W Go-Kart 予約</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>
    <section id="booking" class="booking">
 
    <h2>立即預約</h2>

    <form id="bookingForm">

    <label>姓名</label>
    <input type="text" id="name" placeholder="請輸入姓名" required>

    <label>電子郵件</label>
    <input type="email" id="email" placeholder="請輸入電子郵件" required>

    <label>日期</label>
    <input type="date" id="tourDate" required>

    <label>時間</label>
    <select id="tourTime">
        <option>10:00</option>
        <option>11:00</option>
        <option>12:00</option>
        <option>13:00</option>
        <option>14:00</option>
        <option>15:00</option>
        <option>16:00</option>
        <option>17:00</option>
        <option>18:00</option>
        <option>19:00</option>
        <option>20:00</option>
        <option>21:00</option>
        <option>22:00</option>
    </select>

    <label>人數</label>
    <select id="guests">
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
    </select>
<label>行程方案</label>

<div class="tour-options">

    <label>
    <input
        type="radio"
        name="tourRoute"
        value="Experience Plan"
        checked
    >
       🌆 體驗方案 <br>¥ 6,000/30 分鐘
    </label>

    <label>
    <input
        type="radio"
        name="tourRoute"
        value="Osaka Castle"

    >
        🏯 大阪城<br>¥ 14,000/1.5 小時
        <small>（推薦白天）</small>
    </label>

    <label>
    <input
            type="radio"
            name="tourRoute"
            value="Tsutenkaku"
    >
        🗼 通天閣<br>¥ 14,000/1.5 小時
        <small>（推薦夜晚）</small>
    </label>

</div>
    <button type="submit">
        立即預約
    </button>

</form>
    

</section>

<div id="confirmModal" class="confirm-modal">

    <div class="confirm-box">

        <h2>確認您的預約</h2>

        <div id="confirmContent"></div>

        <div class="confirm-policy">

            <h3>取消與退款政策</h3>

            <ul class="policy-list">

            <li>距離行程開始 48 小時以上可免費取消。</li>
            <li>行程開始前 48 小時內取消，恕不退款。</li>
            <li>可申請改期，需視當日預約狀況而定。</li>
            <li>若因下雨或天候不佳導致行程取消，可選擇全額退款或免費改期。</li>

            </ul>

            <p class="policy-note">
                按下<strong>「確認預約」</strong>,
                後，將前往付款頁面完成預約流程。
            </p>

        </div>

        <div class="confirm-buttons">

            <button id="editBooking">修改資料</button>

            <button id="confirmBooking">予約を確定</button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script src="../script.js"></script>

</body>

</html>
