<!DOCTYPE html>
<html lang="ja">
    

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>W Go-Kart Osaka 予約</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>
    <section id="booking" class="booking">
 
    <h2>今すぐ予約</h2>

    <form id="bookingForm">

    <label>お名前</label>
    <input type="text" id="name" placeholder="請輸入姓名" required>

    <label>メールアドレス</label>
    <input type="email" id="email" placeholder="請輸入電子郵件" required>

    <label>日付</label>
    <input type="date" id="tourDate" required>

    <label>時間</label>
    <select id="tourTime">
        <option>10:00</option>
        <option>11:00</option>
        <option>12:00</option>
        <option>13:00</option>
        <option>14:00</option>
        <option>15:00</option>
        <option>16:00</option>
        <option>17:00</option>
        <option>18:00</option>
        <option>19:00</option>
        <option>20:00</option>
        <option>21:00</option>
        <option>22:00</option>
    </select>

    <label>参加人数</label>
    <select id="guests">
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
        <option>6</option>
        <option>7</option>
    </select>
<label>ツアープラン</label>

<div class="tour-options">

    <label>
    <input
        type="radio"
        name="tourRoute"
        value="Experience Plan"
        checked
    >
       🌆 体験プラン <br>¥6,000 / 30分
    </label>

    <label>
    <input
        type="radio"
        name="tourRoute"
        value="Osaka Castle"

    >
        🏯 大阪城コース<br>¥14,000 / 約1.5時間
        <small>（昼間がおすすめ）</small>
    </label>

    <label>
    <input
            type="radio"
            name="tourRoute"
            value="Tsutenkaku"
    >
        🗼 通天閣コース<br>¥14,000 / 約1.5時間
        <small>（夜がおすすめ）</small>
    </label>

</div>
    <button type="submit">
        今すぐ予約
    </button>

</form>
    

</section>

<div id="confirmModal" class="confirm-modal">

    <div class="confirm-box">

        <h2>ご予約内容の確認</h2>

        <div id="confirmContent"></div>

        <div class="confirm-policy">

            <h3>キャンセル・返金ポリシー</h3>

            <ul class="policy-list">

            <li>ツアー開始48時間前までのキャンセルは無料です。</li>
            <li>ツアー開始48時間以内のキャンセルは返金できません。</li>
            <li>日程変更は可能ですが、空き状況によります。</li>
            <li>雨天や悪天候によりツアーが中止となった場合は、全額返金または無料で日程変更いたします。</li>

            </ul>

            <p class="policy-note">
                <strong>「予約を確定」</strong>を押すと、
                お支払いページへ進み、予約手続きを完了します。
            </p>

        </div>

        <div class="confirm-buttons">

            <button id="editBooking">内容を修正</button>

            <button id="confirmBooking">予約を確定</button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script src="../script.js"></script>

</body>

</html>
