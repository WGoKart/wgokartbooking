<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cancel Booking</title>

<link rel="stylesheet" href="cancel.css">

</head>

<body>

    <!-- 各國語言 -->
    <div class="language-switch">

        <a href="cancel.html">
            <img src="images/flags/us.png" alt="English">
        </a>

        <a href="tw/cancel.html">
            <img src="images/flags/tw.png" alt="繁體中文">
        </a>

        <a href="jp/cancel.html">
            <img src="images/flags/jp.png" alt="日本語">
        </a>
    </div>

<div class="cancel-box">

<h1>Cancel Booking</h1>

<p>
Please enter your Booking ID and Email.
</p>

<input
type="text"
id="bookingId"
placeholder="Booking ID">

<input
type="email"
id="email"
placeholder="Email">

<button id="cancelBtn">
Request Cancellation
</button>

<p id="result"></p>

</div>

<script src="cancel.js"></script>

</body>

</html>
