<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>付款成功 | W Go-Kart Osaka</title>

    <link rel="stylesheet" href="../success.css">

</head>

<body>

<div class="container">

    <div class="check">✓</div>

    <h1>付款成功</h1>

    <h2>感謝您預約 W Go-Kart Osaka</h2>

    <div class="booking-box">

        <span class="booking-label">

            預約編號

        </span>

        <span id="bookingId">

            載入中...

        </span>

    </div>

    <p class="intro">

        我們已成功收到您的付款，您的預約已正式確認。

    </p>

    <p class="email">

        我們已將確認信寄送至您的電子郵件。

        <br>

        若幾分鐘內尚未收到，請檢查垃圾郵件或垃圾信件資料夾。

    </p>

    <div class="info">

        <h3>接下來請注意</h3>

        <ul>

            <li>您的預約已確認完成。</li>

            <li>請於活動開始前 <strong>10 分鐘</strong> 抵達。</li>

            <li>請攜帶 <strong>有效駕照(國際駕照 IDP)</strong>。</li>

            <li>如需修改或取消預約，請盡早與我們聯絡。</li>

        </ul>

    </div>

    <a
        class="home-btn"
        href="https://wgokart.github.io/wgokartosaka/tw/">

        返回首頁

    </a>

    <p class="footer">

        請保留確認信，以便日後查詢。

    </p>

</div>

<script src="../success.js"></script>

</body>

</html>
